<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ՎԱՀԵ & ՔՐԻՍՏԻՆԵ
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#f8f5ef;
overflow-x:hidden;
font-family:'Montserrat',sans-serif;
color:#3f342b;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
background:
linear-gradient(rgba(255,248,240,.45),
rgba(255,248,240,.65)),
url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1600');
background-size:cover;
background-position:center;
position:relative;
}

.hero::before{
content:'';
position:absolute;
inset:0;
backdrop-filter:blur(2px);
}

.hero-content{
position:relative;
z-index:2;
max-width:900px;
}

.hero-subtitle{
font-size:22px;
letter-spacing:5px;
margin-bottom:20px;
color:#8d7762;
}

.hero h1{
font-family:
'Cormorant Garamond',
serif;

font-size:90px;
font-weight:600;
line-height:1.1;
margin-bottom:20px;
color:#4c3d30;
}

.hero-text{
font-size:26px;
line-height:1.8;
max-width:850px;
margin:auto;
color:#5f5145;
}

.date-box{
margin-top:50px;
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.date-card{
background:
rgba(255,255,255,.45);

backdrop-filter:blur(12px);

padding:25px 35px;
border-radius:25px;
min-width:180px;

box-shadow:
0 10px 40px
rgba(0,0,0,.08);
}

.date-card h3{
font-size:16px;
margin-bottom:12px;
letter-spacing:2px;
color:#8b735d;
}

.date-card p{
font-size:24px;
font-weight:600;
}
/* COUNTDOWN */

.countdown-section{
padding:120px 20px;
text-align:center;
background:#fffaf5;
}

.countdown-section h2{
font-family:'Cormorant Garamond',serif;
font-size:70px;
margin-bottom:50px;
color:#4c3d30;
}

.countdown-container{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.count-box{
background:white;
width:180px;
padding:35px 20px;
border-radius:30px;
box-shadow:0 15px 45px rgba(0,0,0,.08);
}

.count-box span{
font-size:56px;
font-weight:700;
display:block;
margin-bottom:10px;
color:#8b735d;
}

.count-box p{
font-size:20px;
}

/* MOBILE */

@media(max-width:900px){

.countdown-section h2{
font-size:46px;
}

.count-box{
width:150px;
padding:25px 15px;
}

.count-box span{
font-size:40px;
}

}
/* MOBILE */

@media(max-width:900px){

.hero{
padding:120px 20px 80px;
}

.hero-subtitle{
font-size:16px;
letter-spacing:3px;
}

.hero h1{
font-size:52px;
}

.hero-text{
font-size:18px;
line-height:1.7;
}

.date-box{
flex-direction:column;
align-items:center;
}

.date-card{
width:100%;
max-width:320px;
}

}

</style>
</head>
<body>

<section class="hero">

<div class="hero-content">

<p class="hero-subtitle">
ՄԵՐ ՍԻՐՈ ՊԱՏՄՈՒԹՅՈՒՆԸ
</p>

<h1>
ՎԱՀԵ <br>
& <br>
ՔՐԻՍՏԻՆԵ
</h1>

<p class="hero-text">

Մեր երջանկությունը ավելի
ամբողջական կլինի Ձեր
ներկայությամբ։

Սիրով հրավիրում ենք Ձեզ
կիսելու մեր կյանքի
ամենաերջանիկ օրը։

</p>

<div class="date-box">

<div class="date-card">
<h3>ՕՐ</h3>
<p>Շուտով</p>
</div>

<div class="date-card">
<h3>ԺԱՄ</h3>
<p>Շուտով</p>
</div>

<div class="date-card">
<h3>ՎԱՅՐ</h3>
<p>Շուտով</p>
</div>

</div>

</div>

</section>
<section class="countdown-section">

<h2>
Մնացել է
</h2>

<div class="countdown-container">

<div class="count-box">
<span id="days">0</span>
<p>Օր</p>
</div>

<div class="count-box">
<span id="hours">0</span>
<p>Ժամ</p>
</div>

<div class="count-box">
<span id="minutes">0</span>
<p>Րոպե</p>
</div>

<div class="count-box">
<span id="seconds">0</span>
<p>Վայրկյան</p>
</div>

</div>

</section>
  <script>

const weddingDate =
new Date("July 07, 2027 18:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();

const distance =
weddingDate - now;

const days =
Math.floor(distance /
(1000 * 60 * 60 * 24));

const hours =
Math.floor((distance %
(1000 * 60 * 60 * 24))
/ (1000 * 60 * 60));

const minutes =
Math.floor((distance %
(1000 * 60 * 60))
/ (1000 * 60));

const seconds =
Math.floor((distance %
(1000 * 60))
/ 1000);

document.getElementById('days')
.innerHTML = days;

document.getElementById('hours')
.innerHTML = hours;

document.getElementById('minutes')
.innerHTML = minutes;

document.getElementById('seconds')
.innerHTML = seconds;

},1000);

</script>
</body>
</html>
